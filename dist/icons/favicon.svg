<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC143C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B0000;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="16" cy="16" r="15" fill="url(#redGrad)" stroke="url(#goldGrad)" stroke-width="1"/>
  
  <!-- Shield -->
  <path d="M16 5 L24 9 L24 16 C24 20 20 24 16 26 C12 24 8 20 8 16 L8 9 Z" 
        fill="url(#goldGrad)" stroke="url(#redGrad)" stroke-width="0.5"/>
  
  <!-- Hammer -->
  <rect x="11" y="11" width="3" height="5" fill="#8B4513"/>
  <rect x="9" y="9" width="6" height="3" fill="url(#goldGrad)" stroke="url(#redGrad)" stroke-width="0.5"/>
  
  <!-- Axe -->
  <rect x="18" y="11" width="3" height="5" fill="#8B4513"/>
  <path d="M16 9 L23 9 L24 13 L23 14 L16 14 L15 13 Z" 
        fill="url(#goldGrad)" stroke="url(#redGrad)" stroke-width="0.5"/>
  
