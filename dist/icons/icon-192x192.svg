<svg width="192" height="192" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="192" height="192" fill="#ffffff"/>
  
  <!-- Main circle - psychology theme -->
  <circle cx="96" cy="96" r="76" fill="#FF6B35"/>
  
  <!-- Inner circle for depth -->
  <circle cx="96" cy="96" r="68" fill="#E55A2B"/>
  
  <!-- Text "ПС" -->
  <text x="96" y="96" font-family="Arial, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" dominant-baseline="middle" fill="#ffffff">ПС</text>
  
  <!-- Decorative elements - law symbols -->
