<svg width="180" height="180" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#DAA520;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC143C;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#B91C1C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B0000;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feFlood flood-color="#000000" flood-opacity="0.3"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect x="10" y="10" width="160" height="160" rx="36" ry="36" 
        fill="url(#redGrad)" stroke="url(#goldGrad)" stroke-width="2" filter="url(#shadow)"/>
  
  <!-- Shield -->
  <path d="M90 35 L140 55 L140 110 C140 140 120 160 90 170 C60 160 40 140 40 110 L40 55 Z" 
        fill="url(#goldGrad)" stroke="url(#redGrad)" stroke-width="2"/>
  
  <!-- Inner shield detail -->
  <path d="M90 45 L130 60 L130 105 C130 130 115 145 90 155 C65 145 50 130 50 105 L50 60 Z" 
        fill="none" stroke="url(#redGrad)" stroke-width="1"/>
  
  <!-- Hammer -->
  <g transform="translate(65, 75)">
    <rect x="12" y="15" width="6" height="25" fill="#8B4513" stroke="#654321" stroke-width="0.5"/>
    <rect x="5" y="8" width="20" height="10" rx="1" fill="url(#goldGrad)" stroke="url(#redGrad)" stroke-width="1"/>
    <line x1="7" y1="11" x2="23" y2="11" stroke="url(#redGrad)" stroke-width="0.5"/>
    <line x1="7" y1="15" x2="23" y2="15" stroke="url(#redGrad)" stroke-width="0.5"/>
  </g>
  
  <!-- Axe -->
  <g transform="translate(105, 75)">
    <rect x="12" y="15" width="6" height="25" fill="#8B4513" stroke="#654321" stroke-width="0.5"/>
    <path d="M8 8 L27 8 L30 20 L27 24 L8 24 L5 20 Z" 
          fill="url(#goldGrad)" stroke="url(#redGrad)" stroke-width="1"/>
    <line x1="12" y1="12" x2="23" y2="12" stroke="url(#redGrad)" stroke-width="0.5"/>
    <circle cx="17.5" cy="18" r="1.5" fill="url(#redGrad)"/>
  </g>
  
  <!-- Center emblem -->
  <circle cx="90" cy="130" r="12" fill="url(#redGrad)" stroke="url(#goldGrad)" stroke-width="1"/>
  <text x="90" y="135" font-family="Arial, sans-serif" font-size="14" font-weight="bold" 
        text-anchor="middle" fill="url(#goldGrad)">ПС</text>
  
  <!-- Decorative elements -->
  <circle cx="55" cy="55" r="2" fill="url(#goldGrad)"/>
  <circle cx="125" cy="55" r="2" fill="url(#goldGrad)"/>
  <circle cx="55" cy="125" r="2" fill="url(#goldGrad)"/>
  <circle cx="125" cy="125" r="2" fill="url(#goldGrad)"/>
</svg>
