<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#DAA520;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC143C;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#B91C1C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B0000;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feFlood flood-color="#000000" flood-opacity="0.3"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="url(#redGradient)" stroke="url(#goldGradient)" stroke-width="8"/>
  
  <!-- Shield shape -->
  <path d="M256 80 L380 140 L380 260 C380 320 320 380 256 400 C192 380 132 320 132 260 L132 140 Z" 
        fill="url(#goldGradient)" 
        stroke="url(#redGradient)" 
        stroke-width="4"
        filter="url(#shadow)"/>
  
  <!-- Inner shield detail -->
  <path d="M256 100 L360 150 L360 250 C360 300 310 350 256 370 C202 350 152 300 152 250 L152 150 Z" 
        fill="none" 
        stroke="url(#redGradient)" 
        stroke-width="2"/>
  
  <!-- Hammer -->
  <g transform="translate(200, 200)">
    <!-- Hammer handle -->
    <rect x="35" y="20" width="8" height="60" fill="#8B4513" stroke="#654321" stroke-width="1"/>
    <!-- Hammer head -->
    <rect x="20" y="10" width="40" height="20" rx="2" fill="url(#goldGradient)" stroke="url(#redGradient)" stroke-width="2"/>
    <!-- Hammer detail -->
    <line x1="25" y1="15" x2="55" y2="15" stroke="url(#redGradient)" stroke-width="1"/>
    <line x1="25" y1="25" x2="55" y2="25" stroke="url(#redGradient)" stroke-width="1"/>
  </g>
  
  <!-- Axe -->
  <g transform="translate(280, 200)">
    <!-- Axe handle -->
    <rect x="35" y="20" width="8" height="60" fill="#8B4513" stroke="#654321" stroke-width="1"/>
    <!-- Axe blade -->
    <path d="M30 10 L50 10 L55 25 L50 30 L30 30 L25 25 Z" 
          fill="url(#goldGradient)" 
          stroke="url(#redGradient)" 
          stroke-width="2"/>
    <!-- Axe detail -->
    <line x1="35" y1="15" x2="45" y2="15" stroke="url(#redGradient)" stroke-width="1"/>
    <circle cx="40" cy="22" r="2" fill="url(#redGradient)"/>
  </g>
  
  <!-- Center emblem -->
  <circle cx="256" cy="320" r="25" fill="url(#redGradient)" stroke="url(#goldGradient)" stroke-width="2"/>
  <text x="256" y="330" font-family="Arial, sans-serif" font-size="24" font-weight="bold" 
        text-anchor="middle" fill="url(#goldGradient)">ПС</text>
  
  <!-- Decorative elements -->
  <circle cx="180" cy="180" r="3" fill="url(#goldGradient)"/>
  <circle cx="332" cy="180" r="3" fill="url(#goldGradient)"/>
  <circle cx="180" cy="332" r="3" fill="url(#goldGradient)"/>
  <circle cx="332" cy="332" r="3" fill="url(#goldGradient)"/>
</svg>
