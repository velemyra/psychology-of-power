<svg width="96" height="96" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="96" height="96" fill="#f59e0b" rx="12"/>
  
  <!-- Coin/Money symbol -->
  <circle cx="48" cy="48" r="28" fill="#ffffff"/>
  <circle cx="48" cy="48" r="24" fill="#f59e0b"/>
  
  <!-- Currency symbol UAH -->
  <text x="48" y="48" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" dominant-baseline="middle" fill="#ffffff">₴</text>
  
  <!-- Fine percentage symbol -->
  <rect x="20" y="20" width="16" height="16" fill="#ef4444" rx="8"/>
  <text x="28" y="28" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" dominant-baseline="middle" fill="#ffffff">%</text>
  
  <!-- Calculator buttons hint -->
  <g opacity="0.3">
    <rect x="65" y="65" width="8" height="8" fill="#ffffff" rx="1"/>
    <rect x="75" y="65" width="8" height="8" fill="#ffffff" rx="1"/>
    <rect x="65" y="75" width="8" height="8" fill="#ffffff" rx="1"/>
    <rect x="75" y="75" width="8" height="8" fill="#ffffff" rx="1"/>
  </g>
</svg>
