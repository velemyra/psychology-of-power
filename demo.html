<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПСИХОЛОГІЯ СИЛИ - Демо</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        :root {
            --primary-color: #FF6B35;
            --secondary-color: #667eea;
            --accent-color: #764ba2;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --dark-color: #1f2937;
            --light-color: #f3f4f6;
            --white: #ffffff;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--dark-color);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }

        .logo-text h1 {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--dark-color);
            margin: 0;
        }

        .logo-text p {
            font-size: 0.8rem;
            color: #666;
            margin: 0;
        }

        .nav {
            display: none;
            gap: 20px;
            align-items: center;
        }

        .nav a {
            color: var(--dark-color);
            text-decoration: none;
            font-weight: 500;
            padding: 8px 12px;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .nav a:hover {
            background: var(--light-color);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            border-radius: 20px;
            background: var(--success-color);
            color: white;
            font-size: 0.8rem;
        }

        .profile-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--secondary-color);
            color: white;
            border: none;
            cursor: pointer;
        }

        .main-content {
            padding: 40px 20px;
        }

        .hero {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }

        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .sos-button {
            background: var(--danger-color);
            color: white;
            border: none;
            padding: 30px 60px;
            border-radius: 50px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            margin: 0 auto;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            box-shadow: var(--shadow-lg);
            animation: pulse 2s infinite;
            transition: all 0.3s ease;
        }

        .sos-button:hover {
            transform: scale(1.05);
            box-shadow: 0 20px 40px rgba(239, 68, 68, 0.3);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .feature-card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .feature-card h3 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: var(--dark-color);
        }

        .feature-card p {
            color: #666;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            min-height: 48px;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background: #e55a2b;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--secondary-color);
            color: white;
        }

        .btn-success {
            background: var(--success-color);
            color: white;
        }

        .btn-outline {
            background: transparent;
            color: var(--dark-color);
            border: 2px solid var(--dark-color);
        }

        .btn-outline:hover {
            background: var(--dark-color);
            color: white;
        }

        .emergency-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .emergency-modal.active {
            display: flex;
        }

        .emergency-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 600px;
            width: 90%;
            text-align: center;
        }

        .emergency-content h2 {
            color: var(--danger-color);
            margin-bottom: 20px;
            font-size: 2rem;
        }

        .video-preview {
            background: #000;
            height: 300px;
            border-radius: 12px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
        }

        .control-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
        }

        .control-btn {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .record-btn {
            background: var(--danger-color);
            color: white;
        }

        .stop-btn {
            background: #666;
            color: white;
        }

        .close-btn {
            background: transparent;
            border: 2px solid var(--dark-color);
            color: var(--dark-color);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .nav {
                display: none;
            }
            
            .hero h1 {
                font-size: 2rem;
            }
            
            .sos-button {
                padding: 20px 40px;
                font-size: 20px;
            }
            
            .features-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [showEmergency, setShowEmergency] = useState(false);
            const [isRecording, setIsRecording] = useState(false);
            const [recordingTime, setRecordingTime] = useState(0);

            useEffect(() => {
                let timer;
                if (isRecording) {
                    timer = setInterval(() => {
                        setRecordingTime(prev => prev + 1);
                    }, 1000);
                }
                return () => clearInterval(timer);
            }, [isRecording]);

            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            };

            const startRecording = () => {
                setIsRecording(true);
                setRecordingTime(0);
                // Симуляція початку запису
                console.log('Recording started');
            };

            const stopRecording = () => {
                setIsRecording(false);
                console.log('Recording stopped');
                alert('Інцидент збережено!');
                setShowEmergency(false);
            };

            return (
                <div>
                    {/* Header */}
                    <header className="header">
                        <div className="container">
                            <div className="header-content">
                                <div className="logo">
                                    <div className="logo-icon">ПС</div>
                                    <div className="logo-text">
                                        <h1>ПСИХОЛОГІЯ СИЛИ</h1>
                                        <p>Захист прав водія</p>
                                    </div>
                                </div>
                                
                                <nav className="nav">
                                    <a href="#incidents">Інциденти</a>
                                    <a href="#complaints">Скарги</a>
                                    <a href="#evidence">Докази</a>
                                    <a href="#fines">Штрафи</a>
                                    <a href="#help">Допомога</a>
                                </nav>
                                
                                <div className="header-actions">
                                    <div className="status-indicator">
                                        <i data-lucide="wifi" size="14"></i>
                                        Online
                                    </div>
                                    <button className="profile-btn">
                                        <i data-lucide="user" size="20"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="main-content">
                        <div className="container">
                            <div className="hero">
                                <h1>ПСИХОЛОГІЯ СИЛИ</h1>
                                <p>Ваш надійний захист при спілкуванні з поліцією</p>
                                
                                <button 
                                    className="sos-button"
                                    onClick={() => setShowEmergency(true)}
                                >
                                    🚨 SOS
                                </button>
                            </div>

                            <div className="features-grid">
                                <div className="feature-card">
                                    <h3>📹 Інциденти</h3>
                                    <p>Перегляньте всі зафіксовані випадки з відеодоказами та геолокацією</p>
                                    <button className="btn btn-primary">
                                        <i data-lucide="folder" size="20"></i>
                                        Переглянути
                                    </button>
                                </div>

                                <div className="feature-card">
                                    <h3>📝 Генератор скарг</h3>
                                    <p>Створіть юридично обґрунтовані скарги до поліції та ДБР</p>
                                    <button className="btn btn-secondary">
                                        <i data-lucide="file-text" size="20"></i>
                                        Створити
                                    </button>
                                </div>

                                <div className="feature-card">
                                    <h3>📂 Докази</h3>
                                    <p>Зберігайте та відправляйте докази на пошту та месенджери</p>
                                    <button className="btn btn-success">
                                        <i data-lucide="package" size="20"></i>
                                        Відкрити
                                    </button>
                                </div>

                                <div className="feature-card">
                                    <h3>💰 Калькулятор штрафів</h3>
                                    <p>Дізнайтеся суми штрафів за ПДР з актуальними ставками</p>
                                    <button className="btn btn-outline">
                                        <i data-lucide="calculator" size="20"></i>
                                        Розрахувати
                                    </button>
                                </div>

                                <div className="feature-card">
                                    <h3>🚦 Дорожні знаки</h3>
                                    <p>Розпізнавання знаків через камеру з детальною інформацією</p>
                                    <button className="btn btn-outline">
                                        <i data-lucide="camera" size="20"></i>
                                        Сканувати
                                    </button>
                                </div>

                                <div className="feature-card">
                                    <h3>⚖️ Юридична допомога</h3>
                                    <p>Консультації та поради юристів для захисту ваших прав</p>
                                    <button className="btn btn-outline">
                                        <i data-lucide="balance-scale" size="20"></i>
                                        Отримати
                                    </button>
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* Emergency Modal */}
                    <div className={`emergency-modal ${showEmergency ? 'active' : ''}`}>
                        <div className="emergency-content">
                            <h2>🚨 ЕКСТРЕНИЙ РЕЖИМ</h2>
                            <p>Фіксація спілкування з поліцією</p>
                            
                            <div className="video-preview">
                                {isRecording ? (
                                    <div>
                                        <div style={{ fontSize: '48px', marginBottom: '10px' }}>🔴</div>
                                        <div>ЗАПИС {formatTime(recordingTime)}</div>
                                    </div>
                                ) : (
                                    <div>
                                        <i data-lucide="camera" size="48"></i>
                                        <div>Камера готова</div>
                                    </div>
                                )}
                            </div>
                            
                            <div className="control-buttons">
                                {!isRecording ? (
                                    <button className="control-btn record-btn" onClick={startRecording}>
                                        <i data-lucide="circle" size="20"></i>
                                        ПОЧАТИ ЗАПИС
                                    </button>
                                ) : (
                                    <button className="control-btn stop-btn" onClick={stopRecording}>
                                        <i data-lucide="square" size="20"></i>
                                        ЗУПИНИТИ
                                    </button>
                                )}
                            </div>
                            
                            <div style={{ marginTop: '20px', fontSize: '14px', color: '#666' }}>
                                <p>📍 Геолокація: автоматично фіксується</p>
                                <p>🎵 Юридичні питання: доступні під час запису</p>
                                <p>☁️ Хмарне збереження: увімкнено</p>
                            </div>
                            
                            <button className="close-btn" onClick={() => setShowEmergency(false)}>
                                Закрити
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // Initialize Lucide icons
        useEffect(() => {
            lucide.createIcons();
        });

        // Render app
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
